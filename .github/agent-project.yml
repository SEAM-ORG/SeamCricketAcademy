# Agent-owned GitHub Project V2 + hygiene config (NO GitHub Actions required).
# Agents read this via scripts/github/*.sh using `gh` CLI only.
#
# Fill once per repo (bootstrap). Owner is the org (or user) that owns Project V2.

version: 1

# GitHub login that owns the Project V2 board (usually the org)
project_owner: SEAM-ORG

# Project number from: gh project list --owner <org>
# Example: https://github.com/orgs/SEAM-ORG/projects/1 → number: 1
project_number: 0  # set via: gh project list --owner SEAM-ORG

# Optional human title (documentation only)
project_title: ""

# Status field name on the board (usually "Status")
status_field: Status

# Map workflow stages → Status single-select option names (exact strings on the board)
status_map:
  backlog: Backlog
  ready: Ready
  in_progress: In Progress
  in_review: In Review
  done: Done

# Labels agents must ensure exist (name: color hex without #)
labels:
  bug: d73a4a
  enhancement: a2eeef
  chore: ededed
  agent-infra: 5319e7
  security: b60205

# Default milestone for OS/tooling work (created if missing)
infra_milestone: "Agent OS & Tooling"

# Protected branch name
protected_branch: main

# On session end: close open PRs older than N days that match these title prefixes
# only when already superseded on main (agent verifies merge state / file presence)
stale_pr_title_prefixes:
  - "chore: initialize Architect"
  - "chore: install Architect"
  - "chore: Agent OS"
