name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
        env:
          PUBLIC_ACADEMY_ID: ${{ vars.PUBLIC_ACADEMY_ID || 'ci-placeholder' }}
          PUBLIC_API_URL: ${{ vars.PUBLIC_API_URL || 'https://example.com' }}
