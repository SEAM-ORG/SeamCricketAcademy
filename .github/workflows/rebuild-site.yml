name: Rebuild Site (non-release)

# Non-release Pages rebuild for data/gallery refresh.
# Does NOT create tags or GitHub Releases — use Release Tag Deploy for versioned releases.

on:
  repository_dispatch:
    types: [rebuild-site]
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-rebuild
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build
        env:
          PUBLIC_ACADEMY_ID: ${{ vars.PUBLIC_ACADEMY_ID }}
          PUBLIC_API_URL: ${{ vars.PUBLIC_API_URL }}

      - name: Copy CNAME to dist
        run: test -f CNAME && cp CNAME dist/ || true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
